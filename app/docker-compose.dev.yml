# Overrides for local development (hot reload, debug, etc.)
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:

  app:
    build:
      target: base
    environment:
      APP_ENV: local
      APP_DEBUG: true
    volumes:
      - .:/var/www
      - /var/www/node_modules

  nginx:
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - .:/var/www

  # Vite dev server (hot reload)
  vite:
    image: node:24-alpine
    container_name: iticparis_vite
    working_dir: /var/www
    command: npm run dev -- --host
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www
      - /var/www/node_modules
    networks:
      - iticparis
