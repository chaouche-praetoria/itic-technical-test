# yaml
name: Deploy Laravel via SSH (password)

on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install Dependencies
        run: npm install

      - name: Remote Deployment
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          REMOTE_REPO_DIR: ${{ secrets.REMOTE_REPO_DIR }}
        run: |
          set -e
          SSH_PORT=${SSH_PORT:-22}
          REMOTE="${SSH_USER}@${SSH_HOST}"
          echo "Connecting to ${REMOTE}:${SSH_PORT} ; directory: ${REMOTE_REPO_DIR}"

          if [ -z "${REMOTE_REPO_DIR}" ]; then
            echo "REMOTE_REPO_DIR is not defined. Set the secret REMOTE_REPO_DIR to your repo path on the remote server." >&2
            exit 1
          fi

          # Install sshpass if not available
          sudo apt-get update -y && sudo apt-get install -y sshpass

          # Remote commands
          sshpass -p "${SSH_PASSWORD}" ssh -o StrictHostKeyChecking=no -p ${SSH_PORT} ${REMOTE} bash -ls << EOF
            set -e
            if [ ! -d "${REMOTE_REPO_DIR}" ]; then
              echo "Dossier ${REMOTE_REPO_DIR} absent. Création et clone en cours..."
              mkdir -p "${REMOTE_REPO_DIR}"
              cd "${REMOTE_REPO_DIR}"
              git clone https://github.com/${{ github.repository }}.git .
            else
              cd "${REMOTE_REPO_DIR}"
            fi

            echo "--- [GIT] Pull"
            git pull origin main

            echo "--- [PHP] Composer Install"
            composer install --no-dev --optimize-autoloader --no-interaction

            echo "--- [JS] NPM Install & Build"
            npm install
            npm run build

            echo "--- [LARAVEL] Database Migration"
            php artisan migrate --force

            echo "--- [LARAVEL] Optimizing Cache"
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo "--- [LARAVEL] Restarting Queue (Optional)"
            php artisan queue:restart || true

            echo "Deployment finished successfully."
          EOF
