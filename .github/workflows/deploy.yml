# yaml
name: Deploy Laravel via SSH (password)

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          target: production

      - name: Remote Deployment
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          REMOTE_REPO_DIR: ${{ secrets.REMOTE_REPO_DIR }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          SSH_PORT=${SSH_PORT:-22}
          REMOTE="${SSH_USER}@${SSH_HOST}"
          IMAGE_TAG="ghcr.io/${{ github.repository }}:latest"
          
          echo "Connecting to ${REMOTE}:${SSH_PORT} ; directory: ${REMOTE_REPO_DIR}"

          if [ -z "${REMOTE_REPO_DIR}" ]; then
            echo "REMOTE_REPO_DIR is not defined. Set the secret REMOTE_REPO_DIR to your repo path on the remote server." >&2
            exit 1
          fi

          # Install sshpass if not available
          sudo apt-get update -y && sudo apt-get install -y sshpass

          # Remote commands
          sshpass -p "${SSH_PASSWORD}" ssh -o StrictHostKeyChecking=no -p ${SSH_PORT} ${REMOTE} bash -ls << EOF
            set -e
            export IMAGE_TAG="${IMAGE_TAG}"
            
            if [ ! -d "${REMOTE_REPO_DIR}" ]; then
              echo "Dossier ${REMOTE_REPO_DIR} absent. Création et clone en cours..."
              mkdir -p "${REMOTE_REPO_DIR}"
              cd "${REMOTE_REPO_DIR}"
              git clone https://github.com/${{ github.repository }}.git .
            else
              cd "${REMOTE_REPO_DIR}"
              git fetch origin main
              git reset --hard origin/main
            fi

            echo "--- [DOCKER] Login to GHCR"
            echo "${GITHUB_TOKEN}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "--- [DOCKER] Pulling New Image"
            docker compose -p itic-technical-test pull app

            echo "--- [DOCKER] Stopping Old Project Services"
            export APP_PORT=8099
            export DB_EXTERNAL_PORT=3366
            
            docker compose -p itic-technical-test down --remove-orphans
            
            # Note: We do NOT use fuser or global docker stop here 
            # to avoid impacting other production apps on the server.

            echo "--- [DOCKER] Restarting Project Services"
            docker compose -p itic-technical-test up -d

            echo "--- [DOCKER] Cleaning up old images"
            docker image prune -f

            echo "Deployment finished successfully."
          EOF
